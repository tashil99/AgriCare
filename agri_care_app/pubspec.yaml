name: AgriCare
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  crypto: ^3.0.3
  image_picker: ^1.1.2
  camera: ^0.12.0
  http: ^1.2.2
  supabase_flutter: ^2.5.6
  path_provider: ^2.1.4
  device_preview: ^1.3.1
  path: ^1.9.0
  provider: ^6.1.2
  lottie: ^3.1.2
  cupertino_icons: ^1.0.8
  share_plus: ^12.0.2
  pdf: ^3.10.7
  printing: ^5.12.0
  open_filex: ^4.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.jpg
    - assets/logo_1.png
    - assets/animations/plant_scan.json
    - assets/animations/plant.json

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
        - asset: assets/fonts/Poppins-SemiBold.ttf
        - asset: assets/fonts/Poppins-Bold.ttf

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: "assets/logo.jpg"